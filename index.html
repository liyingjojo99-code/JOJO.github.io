<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>再回一句｜Vibe Jam Dialogue Game</title>
  <style>
    :root {
      --bg: #05070b;
      --panel: rgba(15, 23, 42, 0.92);
      --panel2: rgba(2, 6, 23, 0.78);
      --line: rgba(71, 85, 105, 0.55);
      --muted: #94a3b8;
      --text: #e5e7eb;
      --blue: #2563eb;
      --red: #ef4444;
      --green: #34d399;
      --amber: #f59e0b;
      --cyan: #22d3ee;
      --violet: #8b5cf6;
      --pink: #ec4899;
      --shadow: 0 24px 80px rgba(0, 0, 0, 0.45);
      --radius: 28px;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at 0% 0%, rgba(37, 99, 235, .20), transparent 35%),
        radial-gradient(circle at 100% 100%, rgba(239, 68, 68, .13), transparent 35%),
        var(--bg);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
      padding: 24px;
      overflow-x: hidden;
    }

    button { font-family: inherit; cursor: pointer; }
    .app {
      max-width: 1440px;
      margin: 0 auto;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      overflow: hidden;
      background: rgba(2, 6, 23, .92);
      box-shadow: var(--shadow);
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 14px 18px;
      background: rgba(15, 23, 42, .95);
      border-bottom: 1px solid rgba(51, 65, 85, .85);
    }

    .window-dots { display: flex; gap: 8px; align-items: center; }
    .dot { width: 12px; height: 12px; border-radius: 999px; }
    .dot.red { background: #f87171; }
    .dot.yellow { background: #fbbf24; }
    .dot.green { background: #34d399; }
    .program {
      display: flex;
      align-items: center;
      gap: 12px;
      color: #94a3b8;
      font-size: 12px;
      letter-spacing: .18em;
      text-transform: uppercase;
    }
    .divider { width: 1px; height: 24px; background: #334155; }

    .reset-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(2, 6, 23, .95);
      color: #e2e8f0;
      border: 1px solid #334155;
      border-radius: 14px;
      padding: 10px 14px;
      font-size: 12px;
      transition: .18s;
    }
    .reset-btn:hover { background: #1e293b; border-color: #64748b; }

    .header {
      padding: 26px 28px;
      border-bottom: 1px solid rgba(51, 65, 85, .85);
      background: rgba(2, 6, 23, .78);
      display: flex;
      justify-content: space-between;
      gap: 24px;
      align-items: end;
    }

    .eyebrow {
      color: rgba(252, 165, 165, .85);
      font-size: 12px;
      letter-spacing: .26em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    h1 {
      margin: 0;
      font-size: clamp(34px, 5vw, 56px);
      line-height: 1.02;
      letter-spacing: -.04em;
    }

    .subtitle {
      margin: 12px 0 0;
      max-width: 780px;
      color: #94a3b8;
      font-size: 14px;
      line-height: 1.8;
    }

    .stats {
      width: min(540px, 100%);
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
    }

    .stat {
      border: 1px solid #475569;
      background: rgba(30, 41, 59, .8);
      border-radius: 14px;
      padding: 10px 12px;
      font-size: 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      color: #e2e8f0;
    }
    .stat .label {
      color: rgba(226, 232, 240, .72);
      letter-spacing: .16em;
      text-transform: uppercase;
      font-size: 10px;
    }
    .stat .value { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size: 14px; }
    .stat.good { border-color: rgba(52, 211, 153, .5); color: #bbf7d0; background: rgba(52, 211, 153, .1); }
    .stat.danger { border-color: rgba(239, 68, 68, .6); color: #fecaca; background: rgba(239, 68, 68, .1); }

    .layout {
      display: grid;
      grid-template-columns: 300px minmax(0, 1fr) 310px;
      min-height: 780px;
    }

    aside { background: rgba(2, 6, 23, .72); padding: 18px; }
    .left { border-right: 1px solid rgba(51, 65, 85, .85); }
    .right { border-left: 1px solid rgba(51, 65, 85, .85); }

    .card {
      border: 1px solid rgba(51, 65, 85, .9);
      background: rgba(15, 23, 42, .68);
      border-radius: 22px;
      padding: 18px;
      margin-bottom: 16px;
    }

    .card-title { font-size: 14px; font-weight: 650; margin-bottom: 12px; }
    .mission-head {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      margin-bottom: 14px;
    }
    .smallcap {
      color: #64748b;
      font-size: 11px;
      letter-spacing: .18em;
      text-transform: uppercase;
      margin-bottom: 4px;
    }
    .live {
      color: #fecaca;
      background: rgba(239, 68, 68, .1);
      border: 1px solid rgba(239, 68, 68, .4);
      border-radius: 999px;
      padding: 5px 10px;
      font-size: 12px;
    }
    .progress-row {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      color: #94a3b8;
      margin-bottom: 8px;
    }
    .bar { height: 8px; overflow: hidden; border-radius: 999px; background: #1e293b; }
    .bar-fill {
      height: 100%;
      width: 0%;
      background: var(--green);
      transition: width .25s ease;
      border-radius: 999px;
    }
    .card p { margin: 10px 0 0; color: #94a3b8; font-size: 12px; line-height: 1.75; }
    .red-card { border-color: rgba(248, 113, 113, .35); background: rgba(239, 68, 68, .1); }
    .red-card .card-title { color: #fee2e2; }
    .red-card p { color: rgba(254, 226, 226, .82); }
    .tipbox {
      margin-top: 12px;
      border: 1px solid rgba(248, 113, 113, .25);
      background: rgba(2, 6, 23, .48);
      border-radius: 14px;
      padding: 12px;
      color: rgba(254, 226, 226, .78);
      font-size: 12px;
      line-height: 1.7;
    }
    .tipbox strong { color: #fecaca; display: block; margin-bottom: 4px; }

    .center { min-width: 0; display: flex; flex-direction: column; background: rgba(2, 6, 23, .38); }
    .chat-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      padding: 16px 18px;
      border-bottom: 1px solid rgba(51, 65, 85, .85);
      background: rgba(15, 23, 42, .65);
    }
    .identity { display: flex; align-items: center; gap: 14px; }
    .headline { font-size: 15px; font-weight: 650; }
    .subline { color: #64748b; font-size: 12px; margin-top: 3px; }
    .listen {
      display: flex;
      align-items: center;
      gap: 8px;
      color: #94a3b8;
      border: 1px solid #334155;
      border-radius: 999px;
      padding: 8px 12px;
      font-size: 12px;
      background: rgba(2, 6, 23, .75);
    }

    .start {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 28px;
      min-height: 640px;
      text-align: center;
    }
    .start-box { max-width: 600px; }
    .start-box h2 {
      margin: 0;
      font-size: clamp(32px, 4.4vw, 48px);
      letter-spacing: -.04em;
      line-height: 1.05;
    }
    .start-box p { margin: 18px auto 0; max-width: 460px; color: #94a3b8; line-height: 1.75; font-size: 14px; }
    .primary {
      margin-top: 30px;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: #2563eb;
      color: white;
      border: 0;
      border-radius: 14px;
      padding: 14px 24px;
      font-weight: 650;
      font-size: 14px;
      box-shadow: 0 20px 44px rgba(37, 99, 235, .22);
      transition: .18s;
    }
    .primary:hover { background: #3b82f6; transform: translateY(-1px); }

    .chat-scroll {
      flex: 1;
      min-height: 520px;
      max-height: 720px;
      overflow-y: auto;
      padding: 24px 24px 32px;
      display: flex;
      flex-direction: column;
      gap: 22px;
      scroll-behavior: smooth;
    }

    .msg { display: flex; gap: 14px; align-items: flex-start; animation: in .22s ease both; }
    @keyframes in { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .msg.player { justify-content: flex-end; }
    .avatar {
      width: 46px;
      height: 46px;
      flex-shrink: 0;
      border-radius: 18px;
      border: 1px solid;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      font-size: 13px;
      font-weight: 800;
    }
    .avatar img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .avatar.student { background: rgba(139, 92, 246, .2); color: #ede9fe; border-color: rgba(167, 139, 250, .45); }
    .avatar.player { background: rgba(37, 99, 235, .22); color: #dbeafe; border-color: rgba(96, 165, 250, .45); }
    .avatar.mentor { background: rgba(245, 158, 11, .22); color: #fef3c7; border-color: rgba(252, 211, 77, .45); }
    .avatar.parent { background: rgba(239, 68, 68, .18); color: #fee2e2; border-color: rgba(248, 113, 113, .45); }
    .avatar.peer { background: rgba(236, 72, 153, .18); color: #fce7f3; border-color: rgba(244, 114, 182, .45); }
    .avatar.system { background: rgba(16, 185, 129, .18); color: #d1fae5; border-color: rgba(52, 211, 153, .45); }
    .avatar.group { background: rgba(34, 211, 238, .18); color: #cffafe; border-color: rgba(103, 232, 249, .45); }

    .bubblewrap { max-width: min(78%, 760px); }
    .player .bubblewrap { text-align: right; }
    .meta {
      color: #64748b;
      font-size: 10px;
      letter-spacing: .16em;
      text-transform: uppercase;
      margin: 0 4px 7px;
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
      align-items: center;
    }
    .player .meta { justify-content: flex-end; }
    .bubble {
      border-radius: 28px;
      padding: 16px 20px;
      line-height: 1.7;
      font-size: 15px;
      font-weight: 650;
      box-shadow: 0 12px 30px rgba(0, 0, 0, .22);
      white-space: pre-wrap;
    }
    .bubble.student { background: #1e293b; color: #e2e8f0; border-bottom-left-radius: 8px; }
    .bubble.player { background: #2563eb; color: white; border-bottom-right-radius: 8px; }
    .bubble.mentor { background: rgba(245, 158, 11, .14); color: #fffbeb; border: 1px solid rgba(245, 158, 11, .33); border-bottom-left-radius: 8px; }
    .bubble.parent { background: rgba(239, 68, 68, .14); color: #fff1f2; border: 1px solid rgba(248, 113, 113, .33); border-bottom-left-radius: 8px; }
    .bubble.peer { background: rgba(236, 72, 153, .14); color: #fdf2f8; border: 1px solid rgba(244, 114, 182, .33); border-bottom-left-radius: 8px; }
    .bubble.system { background: rgba(16, 185, 129, .14); color: #ecfdf5; border: 1px solid rgba(52, 211, 153, .33); border-bottom-left-radius: 8px; }
    .bubble.group { background: rgba(34, 211, 238, .14); color: #ecfeff; border: 1px solid rgba(103, 232, 249, .33); border-bottom-left-radius: 8px; }

    .typing { display: flex; gap: 5px; width: fit-content; border-radius: 20px; background: rgba(51, 65, 85, .85); padding: 14px 18px; }
    .typing span { width: 8px; height: 8px; border-radius: 50%; background: #cbd5e1; animation: dot 1s infinite ease-in-out; }
    .typing span:nth-child(2) { animation-delay: .15s; }
    .typing span:nth-child(3) { animation-delay: .3s; }
    @keyframes dot {
      0%, 80%, 100% { opacity: .25; transform: translateY(0); }
      40% { opacity: 1; transform: translateY(-4px); }
    }

    .choice-area { border-top: 1px solid rgba(51, 65, 85, .88); background: rgba(2, 6, 23, .96); padding: 18px; }
    .choice-area.interrupt { border-top-color: rgba(248, 113, 113, .35); background: rgba(69, 10, 10, .38); }
    .choice-label { color: #64748b; font-size: 12px; letter-spacing: .18em; text-transform: uppercase; margin: 0 0 12px; }
    .interrupt .choice-label { color: #fca5a5; }
    .choices { display: grid; gap: 12px; }
    .choice-btn {
      width: 100%;
      border: 1px solid rgba(51, 65, 85, .9);
      background: rgba(15, 23, 42, .78);
      color: #e2e8f0;
      text-align: left;
      border-radius: 16px;
      padding: 16px 18px;
      line-height: 1.65;
      font-size: 14px;
      transition: .18s;
    }
    .choice-btn:hover { border-color: rgba(59, 130, 246, .72); background: rgba(37, 99, 235, .12); }
    .interrupt .choice-btn { border-color: rgba(248, 113, 113, .25); background: rgba(248, 113, 113, .1); color: #fff1f2; }
    .interrupt .choice-btn:hover { border-color: rgba(252, 165, 165, .68); background: rgba(248, 113, 113, .16); }
    .num {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 26px;
      height: 26px;
      margin-right: 10px;
      border-radius: 9px;
      background: #1e293b;
      color: #94a3b8;
      font-size: 12px;
      font-weight: 800;
    }
    .choice-btn:hover .num { background: #2563eb; color: white; }
    .interrupt .num { background: rgba(248, 113, 113, .22); color: #fecaca; }

    .ending {
      margin: 34px auto 0;
      max-width: 720px;
      text-align: center;
      border: 1px solid rgba(52, 211, 153, .35);
      background: rgba(52, 211, 153, .10);
      border-radius: 34px;
      padding: 30px;
      box-shadow: 0 22px 64px rgba(6, 78, 59, .22);
      animation: in .25s ease both;
    }
    .ending-tag { color: #6ee7b7; letter-spacing: .24em; text-transform: uppercase; font-size: 12px; margin-bottom: 8px; }
    .ending h2 { margin: 0; font-size: 32px; }
    .ending p { color: rgba(236, 253, 245, .84); line-height: 1.9; margin: 18px 0 0; font-size: 14px; }
    .ending button {
      margin-top: 24px;
      background: #34d399;
      color: #022c22;
      border: 0;
      border-radius: 14px;
      padding: 13px 20px;
      font-weight: 800;
    }

    .queue-state {
      border: 1px solid rgba(51, 65, 85, .9);
      background: rgba(2, 6, 23, .68);
      border-radius: 14px;
      padding: 13px;
      color: #94a3b8;
      font-size: 12px;
      line-height: 1.7;
    }
    .queue-state.hot { border-color: rgba(248, 113, 113, .4); background: rgba(239, 68, 68, .1); color: #fecaca; }
    .mini-grid { margin-top: 12px; display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 10px; }
    .mini { border: 1px solid rgba(51, 65, 85, .9); background: rgba(2, 6, 23, .68); border-radius: 14px; padding: 12px; font-size: 12px; }
    .mini span { color: #64748b; display: block; margin-bottom: 4px; }
    .mini strong { color: #e2e8f0; }
    .pressure-list { max-height: 350px; overflow-y: auto; display: grid; gap: 10px; padding-right: 2px; }
    .empty {
      border: 1px dashed rgba(248, 113, 113, .35);
      border-radius: 14px;
      padding: 14px;
      color: rgba(254, 226, 226, .6);
      font-size: 12px;
      line-height: 1.7;
    }
    .pressure-item {
      border: 1px solid rgba(248, 113, 113, .25);
      background: rgba(2, 6, 23, .48);
      border-radius: 14px;
      padding: 12px;
      color: rgba(255, 241, 242, .8);
      font-size: 12px;
      line-height: 1.7;
    }
    .pressure-time { color: #fecaca; font-weight: 700; margin-bottom: 4px; }

    @media (max-width: 1100px) {
      body { padding: 12px; }
      .header { flex-direction: column; align-items: stretch; }
      .stats { grid-template-columns: repeat(2, minmax(0, 1fr)); width: 100%; }
      .layout { grid-template-columns: 1fr; }
      .left, .right { border: 0; border-bottom: 1px solid rgba(51, 65, 85, .85); }
      .right { border-top: 1px solid rgba(51, 65, 85, .85); }
      .chat-scroll { max-height: none; }
    }

    @media (max-width: 640px) {
      body { padding: 0; }
      .app { border-radius: 0; min-height: 100vh; }
      .program { letter-spacing: .08em; }
      .divider { display: none; }
      .topbar { align-items: flex-start; }
      .reset-btn { padding: 9px 10px; }
      .stats { grid-template-columns: 1fr; }
      .bubblewrap { max-width: 86%; }
      .bubble { font-size: 14px; }
      .chat-head { align-items: flex-start; flex-direction: column; }
      .listen { align-self: flex-start; }
    }
  </style>
</head>

<body>
  <div id="app"></div>

  <script>
    const AVATAR_IMAGES = {
      clara: "https://i.postimg.cc/QFFX9YDY/avatar-clara-jpg.jpg",
      student: "https://i.postimg.cc/18VQ5gcZ/avatar-student-jpg.jpg",
      parent: "https://i.postimg.cc/VJ08LSBm/avatar-parent-jpg.jpg",
      mentor: "https://i.postimg.cc/grMrBTzd/72502613-03ea-47a9-8116-2b598083f745.png",
    };

    const speakers = {
      student: { name: "林同学", role: "作品集学生", avatar: "林", avatarUrl: AVATAR_IMAGES.student, cls: "student" },
      player: { name: "Clara", role: "教务", avatar: "C", avatarUrl: AVATAR_IMAGES.clara, cls: "player" },
      mentor: { name: "安老师", role: "教研主管", avatar: "安", avatarUrl: AVATAR_IMAGES.mentor, cls: "mentor" },
      parent: { name: "学生家长", role: "压力短信", avatar: "家", avatarUrl: AVATAR_IMAGES.parent, cls: "parent" },
      peer: { name: "Mina", role: "同班同学", avatar: "M", cls: "peer" },
      system: { name: "Deadline OS", role: "系统通知", avatar: "OS", cls: "system" },
      group: { name: "提交群聊", role: "群消息", avatar: "群", cls: "group" },
    };

    const INITIAL_STATS = { trust: 2, stress: 2, time: 10, progress: 0 };
    const LIMITS = { trust: [0, 6], stress: [0, 8], time: [0, 10], progress: [0, 8] };
    const clamp = (value, min, max) => Math.max(min, Math.min(max, value));

    const scenes = [
      {
        id: "opening",
        timeStamp: "02:43 AM",
        student: "我真的做不完了。还有十分钟截止，我的作品集页面看起来还是没整理好。",
        choices: [
          { text: "先别慌。直接告诉我现在缺哪一块。", reply: "缺项目描述，还有图片顺序。我不知道该先改哪个。", delta: { progress: 1, stress: 1, time: -1 } },
          { text: "先呼吸一下。我们现在不是把它做到完美，只是把它做到可以提交。", reply: "可以提交……不是完美。好，我可以先按这个标准来。", delta: { trust: 1, stress: -1, time: -1 } },
          { text: "应该没事。现在有什么就直接交什么吧。", reply: "这不太有用。我知道它现在还不行。", delta: { trust: -1, time: -1 } },
        ],
        interrupt: {
          speaker: "mentor",
          timeStamp: "02:44 AM",
          text: "安老师：最后十分钟不要重做结构。优先保证能提交、能读懂、责任清楚。",
          choices: [
            { text: "回复安老师：收到，我们只做 Submit-ready，不做大重构。", reply: "安老师：对。这个判断是对的。先把可提交版本交出去。", delta: { trust: 1 } },
            { text: "追问安老师：能不能再解释一下评分标准？", reply: "安老师：现在不是讨论评分的时候。先完成提交。", delta: { time: -1, stress: 1 } },
            { text: "不回复安老师，继续和学生说话。", reply: "安老师没有继续发消息，但右上角的未读提示还在闪。", delta: { stress: 1 } },
          ],
        },
      },
      {
        id: "screenshots",
        timeStamp: "02:45 AM",
        student: "我的截图太多了。我不知道该保留哪几张。",
        choices: [
          { text: "图片多一点会显得更丰富。都留着吧。", reply: "可是现在已经很挤了。我感觉更乱了。", delta: { stress: 1, trust: -1, time: -1 } },
          { text: "删掉所有不能说明你负责内容的图片。", reply: "好。我只留能证明我实际参与内容的图。", delta: { progress: 1, time: -1 } },
          { text: "只保留三类：最终效果图、制作拆解图、一张过程图。", reply: "这样就有结构了。我可以把多余的图删掉。", delta: { progress: 1, trust: 1, time: -1 } },
        ],
        interrupt: {
          speaker: "parent",
          timeStamp: "02:46 AM",
          text: "家长短信：老师您好，孩子现在到底做到哪一步了？我们很着急，这个作品集今天必须交上去吧？",

    function mergeStats(base, delta = {}) {
      return {
        trust: clamp(base.trust + (delta.trust || 0), LIMITS.trust[0], LIMITS.trust[1]),
        stress: clamp(base.stress + (delta.stress || 0), LIMITS.stress[0], LIMITS.stress[1]),
        time: clamp(base.time + (delta.time || 0), LIMITS.time[0], LIMITS.time[1]),
        progress: clamp(base.progress + (delta.progress || 0), LIMITS.progress[0], LIMITS.progress[1]),
      };
    }

    function getEnding(stats) {
      if (stats.trust <= 0) return "cold";
      if (stats.stress >= 7) return "panic";
      if (stats.time <= 0 && stats.progress >= 6) return "late";
      if (stats.time <= 0) return "unfinished";
      if (stats.progress >= 7 && stats.trust >= 3 && stats.stress <= 5) return "submitted";
      if (stats.progress >= 5 && stats.time > 0) return "alive";
      return "unfinished";
    }

    function getFatalEnding(stats) {
      if (stats.trust <= 0) return "cold";
      if (stats.stress >= 7) return "panic";
      if (stats.time <= 0) return getEnding(stats);
      return null;
    }

    function addMessage(message) {
      state.history.push(message);
      render();
    }

    function setTyping(value) {
      state.isTyping = value;
      render();
    }

    function resetGame() {
      state = {
        started: false,
        stats: { ...INITIAL_STATS },
        sceneIndex: 0,
        history: [],
        phase: "idle",
        endingKey: null,
        isTyping: false,
        pendingInterrupt: null,
        pressureLog: [],
      };
      render();
    }

    function startGame() {
      state.started = true;
      state.phase = "choice";
      state.history = [

        { speaker: "student", text: scenes[0].student, timeStamp: scenes[0].timeStamp },
      ];
      render();
    }

    function goToNextScene(fromIndex, baseStats = state.stats) {
      if (fromIndex >= scenes.length - 1) {
        window.setTimeout(() => {
          state.endingKey = getEnding(baseStats);
          render();
        }, 500);
        return;
      }

      const nextIndex = fromIndex + 1;
      const nextScene = scenes[nextIndex];
      state.sceneIndex = nextIndex;
      setTyping(true);

      window.setTimeout(() => {
        setTyping(false);
        addMessage({ speaker: "student", text: nextScene.student, timeStamp: nextScene.timeStamp });
        state.phase = "choice";
        render();
      }, 650);
    }

    function finishScene(nextStats, scene, index) {
      const fatalEnding = getFatalEnding(nextStats);
      if (fatalEnding) {
        window.setTimeout(() => {
          state.endingKey = fatalEnding;
          render();
        }, 650);
        return;
      }

      window.setTimeout(() => {
        if (scene.interrupt) {
          state.pendingInterrupt = scene.interrupt;
          addMessage({ speaker: scene.interrupt.speaker, text: scene.interrupt.text, timeStamp: scene.interrupt.timeStamp });

          if (scene.interrupt.speaker === "parent") {
            state.pressureLog.push({
              timeStamp: scene.interrupt.timeStamp,
              text: scene.interrupt.text.replace("家长短信：", ""),
            });
          }

          state.phase = "interruptChoice";
          render();
          return;
        }

        if (index >= scenes.length - 1) {
          state.endingKey = getEnding(nextStats);
          render();
          return;
        }

        goToNextScene(index, nextStats);
      }, 650);
    }

    function applyChoice(choice) {
      if (state.phase !== "choice" || state.endingKey) return;

      const currentScene = scenes[state.sceneIndex];
      const sceneIndex = state.sceneIndex;

      state.phase = "locked";
      addMessage({ speaker: "player", text: choice.text });

      const nextStats = mergeStats(state.stats, choice.delta);

      window.setTimeout(() => setTyping(true), 250);

      window.setTimeout(() => {
        setTyping(false);
        state.stats = nextStats;
        addMessage({ speaker: "student", text: choice.reply, timeStamp: currentScene.timeStamp });
        finishScene(nextStats, currentScene, sceneIndex);
      }, 850);
    }

    function handleInterruptChoice(choice) {
      if (state.phase !== "interruptChoice" || !state.pendingInterrupt) return;

      const pending = state.pendingInterrupt;
      const sceneIndex = state.sceneIndex;

      state.phase = "locked";
      addMessage({ speaker: "player", text: "处理插话：" + choice.text });

      const nextStats = mergeStats(state.stats, choice.delta);

      window.setTimeout(() => setTyping(true), 200);

      window.setTimeout(() => {
        setTyping(false);
        state.stats = nextStats;
        addMessage({ speaker: pending.speaker, text: choice.reply, timeStamp: pending.timeStamp });
        state.pendingInterrupt = null;

        const fatalEnding = getFatalEnding(nextStats);
        if (fatalEnding) {
          window.setTimeout(() => {
            state.endingKey = fatalEnding;
            render();
          }, 650);
          return;
        }

        if (sceneIndex >= scenes.length - 1) {
          window.setTimeout(() => {
            state.endingKey = getEnding(nextStats);
            render();
          }, 650);
          return;
        }

        window.setTimeout(() => goToNextScene(sceneIndex, nextStats), 650);
      }, 850);
    }

      const danger = key === "stress" ? value >= 6 : key === "time" ? value <= 2 : value <= 1;

                </div>
                <div class="bar"><div class="bar-fill" style="width:${progressPercent}%"></div></div>
                <p>目标：在时间归零前，保持学生信任，压住外部压力，把提交进度推到安全线。</p>
              </section>

              <section class="card red-card">
                <div class="card-title">⚠ 家长压力源</div>
                <p>家长短信会在关键阶段插入。如果处理不当，学生压力会上升，可能提前进入崩溃结局。</p>
                <div class="tipbox">
                  <strong>建议处理方式</strong>
                  简短、稳定、不要把家长焦虑转给学生；先保证提交，再同步结果。
                </div>
              </section>
            </aside>

            <section class="center">
              <div class="chat-head">
                <div class="identity">
                  ${avatarHTML("student")}
                  <div>
                    <div class="headline">林同学 / Portfolio Submit</div>
                    <div class="subline">Clara 正在协助提交 · 家长短信可能打断会话</div>
                  </div>
                </div>
                <div class="listen">🔔 ${state.pendingInterrupt ? "有插话待处理" : "监听中"}</div>
              </div>

              ${!state.started ? `
                <div class="start">
                  <div class="start-box">
                    <div class="smallcap">02:43 AM / Deadline Mode</div>
                    <h2>一个截止时间。一个学生。再回一句。</h2>
                    <p>你是教务 Clara。你需要在学生、教研主管、家长短信和提交系统之间做出取舍。</p>
                    <button class="primary" onclick="startGame()">启动工作台 →</button>
                  </div>
                </div>
              ` : `
                <div id="chat-scroll-area" class="chat-scroll">
                  ${state.history.map(messageHTML).join("")}
                  ${state.isTyping ? typingHTML() : ""}
                  ${endingHTML()}
                </div>
                ${choicesHTML()}
              `}
            </section>

            <aside class="right">
              <section class="card">
                <div class="card-title">🔔 外部消息队列</div>
                <div class="queue-state ${state.pendingInterrupt ? "hot" : ""}">
                  ${state.pendingInterrupt ? "当前有插话正在打断主线会话。必须处理后才能继续推进学生提交。" : "暂无待处理插话。系统会在关键阶段插入安老师、同学、群聊、家长或导出通知。"}
                </div>
                <div class="mini-grid">
                  <div class="mini"><span>当前阶段</span><strong>${state.started ? `${state.sceneIndex + 1}/${scenes.length}` : "未开始"}</strong></div>
                  <div class="mini"><span>输入状态</span><strong>${state.phase === "choice" ? "等待回复" : state.phase === "interruptChoice" ? "处理插话" : state.phase === "locked" ? "对方输入中" : "待启动"}</strong></div>
                </div>
              </section>

              <section class="card red-card">
                <div class="card-title">☎ 家长催促进度短信</div>
                <div class="pressure-list">
                  ${state.pressureLog.length === 0 ? `
                    <div class="empty">家长压力短信出现后会记录在这里。</div>
                  ` : state.pressureLog.map(item => `
                    <div class="pressure-item">
                      <div class="pressure-time">☎ ${escapeHTML(item.timeStamp)}</div>
                      <div>${escapeHTML(item.text)}</div>
                    </div>
                  `).join("")}
                </div>
              </section>

              <section class="card" style="border-color: rgba(245,158,11,.25); background: rgba(245,158,11,.10);">
                <div class="card-title" style="color:#fef3c7;">头像接口</div>
                <p style="color:rgba(254,243,199,.84)">当前头像使用 Postimages 图片直链。若显示文字头像，说明图片链接加载失败，系统会自动回退到文字头像。</p>
              </section>
            </aside>
          </main>
        </div>
      `;

      window.requestAnimationFrame(() => {
        const container = document.getElementById("chat-scroll-area");
        if (container) container.scrollTop = container.scrollHeight;
      });
    }

    function applyChoiceByIndex(index) {
      const scene = scenes[state.sceneIndex];
      if (!scene || !scene.choices[index]) return;
      applyChoice(scene.choices[index]);
    }

    function handleInterruptChoiceByIndex(index) {
      if (!state.pendingInterrupt || !state.pendingInterrupt.choices[index]) return;
      handleInterruptChoice(state.pendingInterrupt.choices[index]);
    }

    function escapeHTML(value) {
      return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function escapeAttr(value) {
      return escapeHTML(value).replace(/`/g, "&#096;");
    }

    window.startGame = startGame;
    window.resetGame = resetGame;
    window.applyChoiceByIndex = applyChoiceByIndex;
    window.handleInterruptChoiceByIndex = handleInterruptChoiceByIndex;

    render();
  </script>
</body>
</html>
